<body style="min-height: 100vh;">
    <h1>Counter</h1>



<div style="position: absolute; bottom: 0;">
    <div style="text-align: center;">
        <h2 class="count">{{count}}</h2>
        <div>
            <button class="btn bg-red" (click)="onClick('decrease')">Decreament</button>
            <button class="btn bg-black" (click)="onClick('reset')">Reset</button>
            <button class="btn bg-green" (click)="onClick('increase')">Increament</button>
        </div>
    </div>
    <app-login></app-login>
    <app-signup></app-signup>
    <app-profile></app-profile>
</div>
</body>
