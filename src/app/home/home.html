<h1>Reactive Form</h1>

<form [formGroup] = "formProperties" (ngSubmit) = "onSubmit()">
  <input type="text" name="name" placeholder="Name" formControlName="name"/>
<br><br>
  <input type="text" name="email" placeholder="Email" formControlName="email"/>
<br><br>
  <input type="password" name="password" placeholder="Password" formControlName="password"/>
<br><br>
  <button>Submit</button>
</form>
