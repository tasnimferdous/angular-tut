<body style="min-height: 100vh;">
    <h1>Signal</h1>
    <div style="text-align: center;">
        <h2 class="count">{{signalValue()}}</h2>
        <div>
            <button class="btn bg-red" (click)="signalValue.set(signalValue() - 1)">Decreament</button>
            <button class="btn bg-black" (click)="signalValue.set(0)">Reset</button>
            <button class="btn bg-green" (click)="signalValue.set(signalValue() + 1)">Increament</button>
        </div>
    </div>

<hr>

    <div style="text-align: center;">
        <h2>{{count()}}</h2>
        <div>
            <button class="btn bg-red" (click)="setSignal()">Update</button>
        </div>
    </div>

<hr>

    <div style="text-align: center;">
        <h2>{{compute()}}</h2>
        <div>
            <button class="btn bg-red" (click)="computeSignal()">Update</button>
        </div>
    </div>

</body>
