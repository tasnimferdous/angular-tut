<body style="min-height: 100vh;">
    <h1>Counter</h1>

    <div style="text-align: center;">
        <h2 class="count">{{count}}</h2>
        <div>
            <button class="btn bg-red" (click)="onClick('decrease')">Decreament</button>
            <button class="btn bg-black" (click)="onClick('reset')">Reset</button>
            <button class="btn bg-green" (click)="onClick('increase')">Increament</button>
        </div>
    </div>

    @for(student of students; track student.name; let id=$index){
        <h2>id: {{id + 1}}, name: {{student.name}}, Email: {{student.mail}}</h2>
        <br>
    }

    <h1>Signal</h1>
    <div style="text-align: center;">
        <h2 class="count">{{signalValue()}}</h2>
        <div>
            <button class="btn bg-red" (click)="signalValue.set(signalValue() - 1)">Decreament</button>
            <button class="btn bg-black" (click)="signalValue.set(0)">Reset</button>
            <button class="btn bg-green" (click)="signalValue.set(signalValue() + 1)">Increament</button>
        </div>
    </div>

</body>
